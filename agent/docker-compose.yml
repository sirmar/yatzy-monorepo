name: yatzy-agent

services:
  agent:
    build:
      context: ..
      dockerfile: agent/Dockerfile
      target: dev
    environment:
      - PYTHONPATH=/agent:/bot
      - UV_LINK_MODE=copy
    volumes:
      - .:/agent
      - /agent/.venv
      - ../bot:/bot
      - ../shared:/shared
      - checkpoints:/checkpoints
      - logs:/logs

  tensorboard:
    build:
      context: ..
      dockerfile: agent/Dockerfile
      target: dev
    environment:
      - PYTHONPATH=/agent:/bot
    volumes:
      - .:/agent
      - /agent/.venv
      - ../bot:/bot
      - ../shared:/shared
      - logs:/logs
    ports:
      - '6006:6006'
    command: ['uv', 'run', 'tensorboard', '--logdir', '/logs', '--host', '0.0.0.0']

volumes:
  checkpoints:
  logs:
