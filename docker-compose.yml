name: yatzy

services:
  yatzy-db:
    container_name: yatzy-db
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yatzy
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 1s
      timeout: 5s
      retries: 30

  backend:
    container_name: yatzy-backend
    image: backend-dev
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: dev
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    environment:
      - UV_LINK_MODE=copy
    volumes:
      - ./backend:/app
      - /app/.venv
      - ./shared:/shared
    env_file: backend/.env
    depends_on:
      yatzy-db:
        condition: service_healthy

  auth-db:
    container_name: yatzy-auth-db
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: yatzy_auth
    volumes:
      - auth_db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 1s
      timeout: 5s
      retries: 30

  auth:
    container_name: yatzy-auth
    image: auth-dev
    build:
      context: auth
      target: dev
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload
    ports:
      - '8001:8001'
    volumes:
      - ./auth:/app
      - /app/.venv
    env_file: auth/.env
    depends_on:
      auth-db:
        condition: service_healthy

  frontend:
    container_name: yatzy-frontend
    image: frontend-dev
    build:
      context: frontend
      target: dev
    command: pnpm dev
    ports:
      - '5173:5173'
    environment:
      - API_PROXY_TARGET=http://backend:8000
      - AUTH_PROXY_TARGET=http://auth:8001
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
      - auth

volumes:
  db_data:
  auth_db_data:
