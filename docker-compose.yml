services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yatzy
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 10

  db-test:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: yatzy_test
    ports:
      - '3307:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-ptest']
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: ghcr.io/amacneil/dbmate
    command: ['--migrations-dir', '/db/migrations', '--no-dump-schema', 'up']
    volumes:
      - ./backend/migrations:/db/migrations
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: ./backend
      target: dev
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - '8000:8000'
    volumes:
      - ./backend:/app
      - /app/.venv
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  backend-dev:
    image: backend-dev
    build:
      context: ./backend
      target: dev
    volumes:
      - ./backend:/app
      - /app/.venv
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      TEST_DATABASE_URL: mysql://root:test@db-test:3306/yatzy_test

  frontend:
    build:
      context: ./frontend
      target: dev
    command: pnpm dev
    ports:
      - '5173:5173'
    environment:
      - API_PROXY_TARGET=http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

  frontend-app:
    build:
      context: ./frontend
      target: production
    ports:
      - '80:80'
    healthcheck:
      test: ['CMD', 'wget', '-q', '--spider', 'http://127.0.0.1:80']
      interval: 5s
      timeout: 5s
      retries: 10
    depends_on:
      - backend

  frontend-dev:
    image: frontend-dev
    build:
      context: ./frontend
      target: dev
    volumes:
      - ./frontend:/app
      - /app/node_modules

  e2e:
    build:
      context: ./frontend
      target: e2e
    command: pnpm test:e2e
    environment:
      - BASE_URL=http://frontend-app:80
    depends_on:
      frontend-app:
        condition: service_healthy

volumes:
  db_data:
