name: CLI CI

on:
  push:
    branches: ['**']
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [lint-dockerfile, lint, types, security]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: sirmar/dev@main
      - run: cd cli && dev ${{ matrix.target }}

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: sirmar/dev@main
      - run: cd cli && dev coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: cli/.coverage
          include-hidden-files: true

  coverage-report:
    needs: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install coverage
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: cli
      - run: cd cli && coverage report --show-missing --fail-under=60
      - name: Write coverage summary
        run: |
          echo '## Coverage' >> $GITHUB_STEP_SUMMARY
          cd cli && coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
