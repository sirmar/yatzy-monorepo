name: CLI CI

on:
  push:
    branches: ['**']
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'cli/**'
      - '.github/workflows/cli.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: cli
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}:yatzy-cli-dev-${{ github.sha }}
          cache-from: type=gha,scope=yatzy-cli-dev
          cache-to: type=gha,mode=max,scope=yatzy-cli-dev

  check:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [lint, types, security]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: yatzy-cli-dev
      - run: make -C cli ${{ matrix.target }}

  unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: yatzy-cli-dev
      - run: make -C cli unit-cov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: cli/.coverage
          include-hidden-files: true

  integration:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: yatzy-cli-dev
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: dev
          load: true
          tags: backend-dev
          cache-from: type=gha,scope=backend-dev
      - uses: docker/build-push-action@v6
        with:
          context: auth
          target: dev
          load: true
          tags: auth-dev
          cache-from: type=gha,scope=auth-dev
      - run: make -C cli integration-cov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-integration
          path: cli/.coverage
          include-hidden-files: true

  coverage:
    needs: [unit, integration]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install coverage
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: cli/coverage-unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-integration
          path: cli/coverage-integration
      - run: |
          cd cli
          coverage combine coverage-unit/.coverage coverage-integration/.coverage
          coverage report --show-missing --fail-under=60
      - name: Write coverage summary
        run: |
          echo '## Coverage' >> $GITHUB_STEP_SUMMARY
          cd cli && coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
