name: Bot CI

on:
  push:
    branches: ['**']
    paths:
      - 'bot/**'
      - 'shared/**'
      - '.github/workflows/bot.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'bot/**'
      - 'shared/**'
      - '.github/workflows/bot.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: bot/Dockerfile
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}:yatzy-bot-bot-${{ github.sha }}
          cache-from: type=gha,scope=yatzy-bot-bot
          cache-to: type=gha,mode=max,scope=yatzy-bot-bot

  check:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [lint, types]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: yatzy-bot-bot
      - run: make -C bot ${{ matrix.target }}

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: yatzy-bot-bot
      - run: make -C bot coverage
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: bot/.coverage
          include-hidden-files: true

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install coverage
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: bot/coverage
      - run: |
          cd bot
          coverage combine coverage/.coverage
          coverage report --show-missing
      - name: Write coverage summary
        run: |
          echo '## Coverage' >> $GITHUB_STEP_SUMMARY
          cd bot && coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
