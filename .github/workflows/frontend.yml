name: Frontend CI

on:
  push:
    branches: ['**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}:frontend-dev-${{ github.sha }}
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,mode=max,scope=frontend-dev

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:frontend-dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:frontend-dev-${{ github.sha }} frontend-dev:latest
      - run: cd frontend && make lint

  types:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:frontend-dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:frontend-dev-${{ github.sha }} frontend-dev:latest
      - run: cd frontend && make types

  unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:frontend-dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:frontend-dev-${{ github.sha }} frontend-dev:latest
      - run: cd frontend && make unit
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: frontend/coverage
          include-hidden-files: true
