name: Frontend CI

on:
  push:
    branches: ['**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'frontend/**'
      - '.github/workflows/frontend.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build-dev:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}:frontend-dev-${{ github.sha }}
          cache-from: type=gha,scope=frontend-dev
          cache-to: type=gha,mode=max,scope=frontend-dev

  build-app:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          target: production
          push: true
          tags: ghcr.io/${{ github.repository }}:frontend-app-${{ github.sha }}
          cache-from: |
            type=gha,scope=frontend-dev
            type=gha,scope=frontend-app
          cache-to: type=gha,mode=max,scope=frontend-app

  build-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          target: e2e
          push: true
          tags: ghcr.io/${{ github.repository }}:frontend-e2e-${{ github.sha }}
          cache-from: |
            type=gha,scope=frontend-dev
            type=gha,scope=frontend-e2e
          cache-to: type=gha,mode=max,scope=frontend-e2e

  check:
    needs: build-dev
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [lint, types, security]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: frontend-dev
      - run: make frontend/${{ matrix.target }}

  unit:
    needs: build-dev
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: frontend-dev
      - run: make frontend/unit
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: frontend/coverage
          include-hidden-files: true

  coverage:
    needs: unit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: coverage
          path: coverage
      - name: Write coverage summary
        run: |
          echo '## Coverage' >> $GITHUB_STEP_SUMMARY
          jq -r '
            .total |
            "| Metric | % |\n|--------|---|\n| Statements | \(.statements.pct)% |\n| Branches | \(.branches.pct)% |\n| Functions | \(.functions.pct)% |\n| Lines | \(.lines.pct)% |"
          ' coverage/coverage-summary.json >> $GITHUB_STEP_SUMMARY

  e2e:
    needs: [build-dev, build-app, build-e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: frontend-dev frontend-app frontend-e2e
      - uses: docker/build-push-action@v6
        with:
          context: backend
          target: dev
          load: true
          tags: backend-dev
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,mode=max,scope=backend-dev
      - run: make frontend/e2e
