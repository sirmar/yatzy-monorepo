name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}:dev-${{ github.sha }}
          cache-from: type=gha,scope=dev
          cache-to: type=gha,mode=max,scope=dev

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:dev-${{ github.sha }} frontend-dev:latest
      - run: make lint

  types:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:dev-${{ github.sha }} frontend-dev:latest
      - run: make types

  unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:dev-${{ github.sha }} frontend-dev:latest
      - run: make unit
      - uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage
          include-hidden-files: true

