name: Auth CI

on:
  push:
    branches: ['**']
    paths:
      - 'auth/**'
      - '.github/workflows/auth.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'auth/**'
      - '.github/workflows/auth.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: auth
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}:auth-dev-${{ github.sha }}
          cache-from: type=gha,scope=auth-dev
          cache-to: type=gha,mode=max,scope=auth-dev

  check:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [lint, types, security]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: auth-dev
      - run: make auth/${{ matrix.target }}

  unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: auth-dev
      - run: make auth/unit-cov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: auth/.coverage
          include-hidden-files: true

  e2e:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: auth-dev
      - run: make auth/e2e-cov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: auth/.coverage
          include-hidden-files: true

  coverage:
    needs: [unit, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install coverage
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: auth/coverage-unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-e2e
          path: auth/coverage-e2e
      - run: |
          cd auth
          coverage combine coverage-unit/.coverage coverage-e2e/.coverage
          coverage report --show-missing --fail-under=90
      - name: Write coverage summary
        run: |
          echo '## Coverage' >> $GITHUB_STEP_SUMMARY
          cd auth && coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
