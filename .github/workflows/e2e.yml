name: E2E CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          target: prod
          load: true
          tags: backend-prod
          cache-from: type=gha,scope=backend-dev
      - uses: docker/build-push-action@v6
        with:
          context: auth
          target: prod
          load: true
          tags: auth-prod
          cache-from: type=gha,scope=auth-dev
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          target: production
          load: true
          tags: frontend-prod
          cache-from: |
            type=gha,scope=frontend-dev
            type=gha,scope=frontend-app
      - uses: docker/build-push-action@v6
        with:
          context: e2e
          load: true
          tags: e2e
      - run: make e2e
