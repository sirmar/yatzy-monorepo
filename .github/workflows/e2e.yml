name: E2E CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [lint-dockerfile, lint, types, security]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: sirmar/dev@main
      - run: cd e2e && dev ${{ matrix.target }}

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          target: prod
          load: true
          tags: backend-prod
          cache-from: |
            type=gha,scope=yatzy-backend-deps
            type=gha,scope=yatzy-backend-coverage
      - uses: docker/build-push-action@v6
        with:
          context: auth
          target: prod
          load: true
          tags: auth-prod
          cache-from: |
            type=gha,scope=yatzy-auth-deps
            type=gha,scope=yatzy-auth-coverage
      - uses: docker/build-push-action@v6
        with:
          context: frontend
          target: prod
          load: true
          tags: frontend-prod
          cache-from: |
            type=gha,scope=yatzy-frontend-deps
            type=gha,scope=frontend-app
      - uses: sirmar/dev@main
      - run: cd e2e && dev run
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
