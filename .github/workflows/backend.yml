name: Backend CI

on:
  push:
    branches: ['**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }}
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,mode=max,scope=backend-dev

  check:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [lint, types, security]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: backend-dev
      - run: make backend/${{ matrix.target }}

  unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: backend-dev
      - run: make backend/unit-cov
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/.coverage
          include-hidden-files: true

  e2e:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/pull-image
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          images: backend-dev
      - run: make backend/e2e-cov SHARD_ID=${{ matrix.shard }} NUM_SHARDS=5
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e-${{ matrix.shard }}
          path: backend/.coverage
          include-hidden-files: true

  coverage:
    needs: [unit, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install coverage
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: backend/coverage-unit
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-e2e-*
          path: backend/coverage-e2e
      - run: |
          cd backend
          coverage combine coverage-unit/.coverage coverage-e2e/*/.coverage
          coverage report --show-missing --fail-under=90
      - name: Write coverage summary
        run: |
          echo '## Coverage' >> $GITHUB_STEP_SUMMARY
          cd backend && coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
