name: Backend CI

on:
  push:
    branches: ['**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'
  pull_request:
    branches: ['**']
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: backend
          target: dev
          push: true
          tags: ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }}
          cache-from: type=gha,scope=backend-dev
          cache-to: type=gha,mode=max,scope=backend-dev

  lint:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }} backend-dev:latest
      - run: cd backend && make lint

  types:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }} backend-dev:latest
      - run: cd backend && make types

  security:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }} backend-dev:latest
      - run: cd backend && make security

  unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }} backend-dev:latest
      - run: cd backend && make unit
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: backend/.coverage
          include-hidden-files: true

  e2e:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        shard: [0, 1, 2, 3, 4]
    steps:
      - uses: actions/checkout@v4
      - name: Start MySQL
        run: |
          sudo sed -i 's/bind-address.*/bind-address = 0.0.0.0/' /etc/mysql/mysql.conf.d/mysqld.cnf
          sudo systemctl start mysql
          mysql -uroot -proot -e "CREATE DATABASE IF NOT EXISTS yatzy_test;"
          mysql -uroot -proot -e "CREATE USER IF NOT EXISTS 'test'@'%' IDENTIFIED BY 'test'; GRANT ALL ON yatzy_test.* TO 'test'@'%';"
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - run: |
          docker pull ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }}
          docker tag ghcr.io/${{ github.repository }}:backend-dev-${{ github.sha }} backend-dev:latest
      - run: cd backend && docker compose run --rm -e TEST_DB_HOST=host.docker.internal -e TEST_DB_PORT=3306 -e TEST_DB_USER=test -e TEST_DB_PASSWORD=test dev uv run pytest tests/e2e/ -v --cov=app --shard-id=${{ matrix.shard }} --num-shards=5
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e-${{ matrix.shard }}
          path: backend/.coverage
          include-hidden-files: true

  coverage:
    needs: [unit, e2e]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.14'
      - run: pip install coverage
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit
      - uses: actions/download-artifact@v4
        with:
          pattern: coverage-e2e-*
          path: coverage-e2e
      - run: coverage combine coverage-unit/.coverage coverage-e2e/*/.coverage && coverage report --show-missing --fail-under=90
      - name: Write coverage summary
        run: |
          echo '## Coverage' >> $GITHUB_STEP_SUMMARY
          coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
