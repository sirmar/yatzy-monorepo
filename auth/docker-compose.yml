services:
  auth-db:
    container_name: ${DEV_DB_CONTAINER}
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${DEV_DB_PASSWORD}
      MYSQL_DATABASE: ${DEV_DB_NAME}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-u${DEV_DB_USER}', '-p${DEV_DB_PASSWORD}']
      interval: 1s
      timeout: 5s
      retries: 30

  auth:
    container_name: ${DEV_CONTAINER}
    image: ${DEV_IMAGE}
    ports:
      - '${DEV_PORT}:8000'
    environment:
      DATABASE_URL: mysql://root:root@${DEV_DB_CONTAINER}:3306/yatzy_auth
      JWT_SECRET: change-me-in-production-use-a-long-secret
    depends_on:
      auth-db:
        condition: service_healthy

volumes:
  db_data:
