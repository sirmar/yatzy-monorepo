name: yatzy-auth-test

networks:
  default:
    name: yatzy-auth-test

services:
  auth-db-test:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: yatzy_auth_test
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-ptest']
      interval: 1s
      timeout: 5s
      retries: 30

  auth-test:
    image: auth-dev
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/.venv
    environment:
      TEST_DATABASE_URL: mysql://root:test@auth-db-test:3306/yatzy_auth_test
      APP_ENV: test
    depends_on:
      auth-db-test:
        condition: service_healthy
