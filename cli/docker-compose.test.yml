name: yatzy-cli-test

networks:
  default:
    name: yatzy-cli-test

services:
  yatzy-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: yatzy
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-ptest']
      interval: 1s
      timeout: 5s
      retries: 30

  auth-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: yatzy_auth
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-ptest']
      interval: 1s
      timeout: 5s
      retries: 30

  backend:
    image: backend-dev
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    volumes:
      - ../backend:/app
      - /app/.venv
    environment:
      DATABASE_URL: mysql://root:test@yatzy-db:3306/yatzy
      JWT_SECRET: test-secret-at-least-32-bytes-long!!
    depends_on:
      yatzy-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8000/players")']
      interval: 2s
      timeout: 5s
      retries: 15

  auth:
    image: auth-dev
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8001
    volumes:
      - ../auth:/app
      - /app/.venv
    environment:
      DATABASE_URL: mysql://root:test@auth-db:3306/yatzy_auth
      JWT_SECRET: test-secret-at-least-32-bytes-long!!
    depends_on:
      auth-db:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'python', '-c', 'import urllib.request; urllib.request.urlopen("http://localhost:8001/docs")']
      interval: 2s
      timeout: 5s
      retries: 15

  cli-test:
    image: yatzy-cli-dev
    volumes:
      - .:/app
    environment:
      AUTH_URL: http://auth:8001
      BACKEND_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy
      auth:
        condition: service_healthy
