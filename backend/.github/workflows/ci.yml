name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: make security

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: make lint

  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: make types

  unit-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest tests/unit/ -v --cov=app || [ $? -eq 5 ]
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: .coverage
          include-hidden-files: true

  e2e-test:
    runs-on: ubuntu-latest
    services:
      db-test:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: test
          MYSQL_DATABASE: yatzy_test
        ports:
          - 3307:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      TEST_DB_HOST: 127.0.0.1
      TEST_DB_PORT: 3307
      TEST_DB_USER: root
      TEST_DB_PASSWORD: test
      TEST_DB_NAME: yatzy_test
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - run: uv run pytest tests/e2e/ -v --cov=app || [ $? -eq 5 ]
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-e2e
          path: .coverage
          include-hidden-files: true

  coverage:
    runs-on: ubuntu-latest
    needs: [unit-test, e2e-test]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --extra dev
      - uses: actions/download-artifact@v4
        with:
          name: coverage-unit
          path: coverage-unit
      - uses: actions/download-artifact@v4
        with:
          name: coverage-e2e
          path: coverage-e2e
      - run: uv run coverage combine coverage-unit/.coverage coverage-e2e/.coverage
      - run: uv run coverage report --show-missing --fail-under=90
      - name: Write coverage summary
        run: |
          echo '## Coverage' >> $GITHUB_STEP_SUMMARY
          uv run coverage report --format=markdown >> $GITHUB_STEP_SUMMARY
