name: yatzy-backend

networks:
  default:
    name: yatzy-backend

services:
  yatzy-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yatzy
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', '-proot']
      interval: 1s
      timeout: 5s
      retries: 30

  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
      target: prod
    ports:
      - '8000:8000'
    env_file: .env
    depends_on:
      yatzy-db:
        condition: service_healthy

volumes:
  db_data:
