services:
  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: yatzy
    ports:
      - '3306:3306'
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-proot']
      interval: 5s
      timeout: 5s
      retries: 10

  db-test:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: test
      MYSQL_DATABASE: yatzy_test
    ports:
      - '3307:3306'
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost', '-uroot', '-ptest']
      interval: 5s
      timeout: 5s
      retries: 10

  dev:
    image: backend-dev
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      - /app/.venv
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      TEST_DB_HOST: db-test
      TEST_DB_PORT: '3306'
      TEST_DB_USER: root
      TEST_DB_PASSWORD: test
      TEST_DB_NAME: yatzy_test

  app:
    build:
      context: .
      target: prod
    ports:
      - '8000:8000'
    env_file:
      - path: .env
        required: false
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
