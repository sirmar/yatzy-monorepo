name: yatzy-prod

services:
  yatzy-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${YATZY_DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${YATZY_DB_NAME}
    volumes:
      - yatzy_db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', "-p${YATZY_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  auth-db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: ${AUTH_DB_ROOT_PASSWORD}
      MYSQL_ROOT_HOST: '%'
      MYSQL_DATABASE: ${AUTH_DB_NAME}
    volumes:
      - auth_db_data:/var/lib/mysql
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', '127.0.0.1', '-uroot', "-p${AUTH_DB_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  backend:
    image: ghcr.io/${GHCR_REPO}:backend-${TAG:-latest}
    environment:
      DATABASE_URL: ${BACKEND_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    volumes:
      - media_data:/media
    depends_on:
      yatzy-db:
        condition: service_healthy
    restart: unless-stopped

  auth:
    image: ghcr.io/${GHCR_REPO}:auth-${TAG:-latest}
    environment:
      DATABASE_URL: ${AUTH_DATABASE_URL}
      JWT_SECRET: ${JWT_SECRET}
    depends_on:
      auth-db:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: ghcr.io/${GHCR_REPO}:frontend-${TAG:-latest}
    ports:
      - '80:80'
    environment:
      - BACKEND_HOST=backend
      - AUTH_HOST=auth
    volumes:
      - media_data:/media:ro
    depends_on:
      - backend
      - auth
    restart: unless-stopped

volumes:
  yatzy_db_data:
  auth_db_data:
  media_data:
