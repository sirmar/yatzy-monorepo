services:
  frontend:
    image: frontend-dev
    build:
      context: .
      target: dev
    command: pnpm dev
    ports:
      - '5173:5173'
    environment:
      - API_PROXY_TARGET=http://host.docker.internal:8000
      - AUTH_PROXY_TARGET=http://host.docker.internal:8001
    extra_hosts:
      - host.docker.internal:host-gateway
    volumes:
      - .:/app
      - /app/node_modules
