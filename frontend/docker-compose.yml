services:
  frontend:
    container_name: ${DEV_CONTAINER}
    image: ${DEV_IMAGE}
    ports:
      - '${DEV_PORT}:80'
    environment:
      - BACKEND_HOST=backend
      - AUTH_HOST=auth
    volumes:
      - media_data:/media:ro

volumes:
  media_data:
    external: true
    name: yatzy-backend_media_data
